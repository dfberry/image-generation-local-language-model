version: 1.0
name: sdxl-image-generation-api
description: Containerized SDXL image generation API deployable to Azure Container Apps

services:
  api:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      # Build the image server-side in Azure Container Registry (ACR Tasks)
      # instead of building locally and pushing. Avoids local Docker push
      # failures behind a proxy/VPN and guarantees a linux/amd64 image
      # regardless of host CPU (Apple Silicon builds arm64, which ACA can't run).
      remoteBuild: true

metadata:
  version: 1.0.0
  description: SDXL Image Generation Flask API
  author: dfberry

infra:
  path: infra
  module: main

hooks:
  # predeploy hook removed: azd builds and pushes the Docker image automatically
  # via the services.api.docker block above. A manual docker build here was
  # redundant and would re-tag with :latest instead of azd's deploy tag.
  #
  # postdeploy: keep azd up short and non-blocking. The hook prints the service
  # URL and one-line instructions for triggering POST /model/pull and polling
  # GET /model/status; it does not wait for the model cache to warm.
  postdeploy:
    continueOnError: true
    posix:
      shell: sh
      run: ./scripts/pull-model.sh
    windows:
      shell: pwsh
      run: ./scripts/pull-model.ps1
