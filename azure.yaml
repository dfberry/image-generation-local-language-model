version: 1.0
name: sdxl-image-generation-api
description: Containerized SDXL image generation API deployable to Azure Container Apps

services:
  api:
    project: .
    language: python
    host: containerapp
    dockerfile: Dockerfile.cpu
    port: 8000

metadata:
  version: 1.0.0
  description: SDXL Image Generation Flask API — HTTP door (CPU) on ACA, CLI batch runs locally
  author: dfberry

infra:
  path: infra
  template: main.bicep
  parameters: infra/parameters.json

hooks:
  predeploy:
    shell: sh
    continueOnError: false
    run: |
      echo "Building Docker image (CPU)..."
      docker build -f Dockerfile.cpu -t ${AZURE_CONTAINER_REGISTRY_ENDPOINT}/sdxl-api:latest .
      echo "Docker image built successfully"
  postdeploy:
    shell: sh
    continueOnError: true
    run: |
      echo "SDXL API deployed successfully"
      echo "Service URL: https://${CONTAINER_APP_FQDN}"
