version: 1.0
name: sdxl-image-generation-api
description: Containerized SDXL image generation API deployable to Azure Container Apps

services:
  api:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile.cpu
      context: .

metadata:
  version: 1.0.0
  description: SDXL Image Generation Flask API — HTTP door (CPU) on ACA, CLI batch runs locally
  author: dfberry

infra:
  path: infra
  template: main.bicep
  parameters: infra/parameters.json

hooks:
  postdeploy:
    shell: sh
    continueOnError: true
    run: |
      echo "SDXL API deployed successfully"
      echo "Service URL: https://${CONTAINER_APP_FQDN}"
